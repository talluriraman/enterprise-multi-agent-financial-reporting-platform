# Global pipeline skeleton: build container images and deploy to AKS.
# Wire your Azure subscription, ACR, and service connections in Azure DevOps.

trigger:
  branches:
    include:
      - main

variables:
  tag: "$(Build.BuildId)"
  acrName: "yourregistry"
  imageRepoApi: "$(acrName).azurecr.io/financial-platform-api"
  imageRepoWeb: "$(acrName).azurecr.io/financial-platform-web"

stages:
  - stage: Build
    jobs:
      - job: DockerBuild
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: Docker@2
            displayName: Build API image
            inputs:
              command: buildAndPush
              repository: financial-platform-api
              dockerfile: deploy/Dockerfile.backend
              buildContext: "$(Build.SourcesDirectory)"
              tags: |
                $(tag)
                latest
              containerRegistry: "your-acr-service-connection"

          - task: Docker@2
            displayName: Build Web image
            inputs:
              command: buildAndPush
              repository: financial-platform-web
              dockerfile: deploy/Dockerfile.client
              buildContext: "$(Build.SourcesDirectory)"
              tags: |
                $(tag)
                latest
              containerRegistry: "your-acr-service-connection"

  - stage: DeployAKS
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: HelmDeploy
        pool:
          vmImage: "ubuntu-latest"
        environment: "aks-prod"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: HelmDeploy@0
                  displayName: Helm upgrade (skeleton)
                  inputs:
                    connectionType: Kubernetes Service Connection
                    kubernetesServiceConnection: "your-aks-service-connection"
                    namespace: "financial-platform"
                    command: upgrade
                    chartType: FilePath
                    chartPath: "deploy/helm/financial-platform"
                    releaseName: financial-platform
                    valueFile: "deploy/helm/financial-platform/values.yaml"
                    arguments: "--set image.tag=$(tag) --set client.image.tag=$(tag)"
