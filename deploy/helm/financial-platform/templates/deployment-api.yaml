apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-platform-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: financial-platform-api
  template:
    metadata:
      labels:
        app: financial-platform-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: "{{ $v }}"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
